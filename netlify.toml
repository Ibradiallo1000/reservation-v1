[build]
  publish = "dist"
  command = "npm run build"

[functions]
  directory = "netlify/functions"

# ✅ Redirection explicite pour manifest statique
[[redirects]]
  from = "/manifest.webmanifest"
  to = "/manifest.webmanifest"
  status = 200
  headers = { Content-Type = "application/manifest+json" }

# ✅ Screenshots statiques
[[redirects]]
  from = "/screenshot-wide.png"
  to = "/screenshot-wide.png"
  status = 200

[[redirects]]
  from = "/screenshot-mobile.png"
  to = "/screenshot-mobile.png"
  status = 200

# ——— Support des sous-domaines SaaS dynamiques ———
# Permet à l’app React d’être servie sur malitrans.teliya.app, sonef.teliya.app, etc.
# Le RouteResolver détecte le slug depuis le hostname ; cette règle assure que toutes
# les routes sous *.teliya.app renvoient index.html (SPA).
[[redirects]]
  from = "https://*.teliya.app/*"
  to = "/index.html"
  status = 200

# ✅ SPA routing (domaine principal teliya.app et fallback)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev"
  targetPort = 5177       # ← doit matcher vite.config.ts maintenant
  port = 8889
  autoLaunch = true
